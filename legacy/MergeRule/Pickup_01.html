<title>pickup</title>

<BODY bgcolor="#FFFFFF" text="black" link="blue" vlink="navy" alink="red">
<strong>pickup</strong><br>
<br>
構成要素xnの素性の中に解釈不可能素性が含まれている要素xmがある場合：<br>
<br>
<span class='head'>＜xm, [{範疇素性2, 統語素性2}, 意味素性2</span>, ＜<br>
　　<span class='nonhead'>＜xn, [{範疇素性1, 統語素性1}, 意味素性1, body1]＞</span>,<br>
　　<span class='head'>＜xm, [{範疇素性2}, φ, body2]＞</span><br>
＞]＞<br>
<br>
そのxnを一時的にxmの統語素性として取り込む。元の位置は空にしておく。<br>
<br>
<span class='head'>＜xm, [{範疇素性2, 統語素性2, <span class='pickup'>＜xn, [{範疇素性1, 統語素性1}, 意味素性1, body1]＞</span>}, 意味素性2</span>, ＜<br>
　　<span class='nonhead'>＜＞</span>,<br>
　　<span class='head'>＜xm, [{範疇素性2}, φ, body2]＞</span><br>
＞]＞<br>
<br>
