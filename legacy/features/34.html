<strong><span class='red'>★<span class='orange'>α/β[γ](δ)</span></span></strong><br>
[削除規定]　αβγδの指定がある場合には、その条件が満たされたときのみ、Merge相手βの指標番号で置き換えられる。<br>
　　α：相手の範疇素性<br>
　　β：相手の統語素性（解釈不可能素性 #11/#12 を指定する場合には、第3要素を指定すること）<br>
　　γ：Merge-rule<br>
　　δ：自分が右の要素(right)か、左の要素(left)か<br>
[条件]　propertyのvalueの位置にある場合は、自分が主要部でなければならない。<br>
[条件]　id-slotの位置にある場合は、相手が主要部でなければならない。<br>
