<BODY bgcolor="#FFFFFF" text="black" link="blue" vlink="navy" alink="red">
<strong><span class='red'>＋α<span class='orange'>[β](γ)(δ)</span></span></strong><br>
[削除規定]　αβγδの指定がある場合には、その条件が満たされたときのみ、削除される。<br>
　　α：相手の範疇素性（もしくは、相手の統語素性）<br>
　　β：Merge-rule<br>
　　γ：自分が右の要素(right)か、左の要素(left)か<br>
　　δ：自分が head か、nonhead か<br>
[継承規程]　主要部からのみ継承される
<br>
