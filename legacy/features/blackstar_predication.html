<strong>★[Predication]</strong><br>
[削除規定]　Merge相手がPredication素性＜xa, ＜Subject, xb＞, ＜Predicate, xc＞＞を持っており、自分のxbもしくはxcが自分の指標の場合、xaで置き換えられる。(sec.5.3)<br>
<br>
<strong>＜xn, partitioning＞</strong><br>
[削除規定]　Predication素性 xn に対してPartitioningが適用されたら削除される。(sec.7.4)<br>
[継承規定]　主要部からでも非主要部からでも継承される。(sec.7.4)<br>
