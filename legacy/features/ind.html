<strong>no</strong><br>
[削除規定]　（J-Merge以外での）Mergeの相手が主要部で範疇素性がNの場合に消える。(sec.4.1.1)<br>
[継承規定]　主要部からしか継承されない。J-Merge規則によって、初回のみ（結果的に）非主要部から継承されることになる。(sec.2.3)<br>
