[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "syncsemphone-next-domain"
version = "0.1.0"
description = "Domain layer for syncsemphone-next"
requires-python = ">=3.9"
dependencies = [
  "pydantic==2.8.0",
  "SudachiPy",
  "SudachiDict-core",
  "PyYAML",
]

[project.optional-dependencies]
dev = [
  "pytest==8.3.0",
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
